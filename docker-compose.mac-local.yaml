# Mac local: Open WebUI in Docker + llama.cpp / Ollama on the host.
# Usage: docker compose -f docker-compose.mac-local.yaml up -d

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    environment:
      # ใช้ llama-server บน Mac host เท่านั้น — ไม่โหลดโมเดลใหม่ใน Docker
      - ENABLE_OLLAMA_API=false
      - OPENAI_API_BASE_URLS=http://host.docker.internal:8080/v1
      - OPENAI_API_KEYS=
      - ENABLE_OPENAI_API=true
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-}
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  open-webui: {}
