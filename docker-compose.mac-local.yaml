# Mac local: Open WebUI in Docker + ThaiLLM (OpenAI-compatible API).
# Usage: docker compose -f docker-compose.mac-local.yaml up -d

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    environment:
      - ENABLE_OLLAMA_API=false
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URLS=${OPENAI_API_BASE_URLS:-http://thaillm.or.th/api/v1}
      - OPENAI_API_KEYS=${OPENAI_API_KEYS}
      - DEFAULT_MODELS=${DEFAULT_MODELS:-typhoon-s-thaillm-8b-instruct}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-}
    restart: unless-stopped

volumes:
  open-webui: {}
