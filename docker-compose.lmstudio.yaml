# Open WebUI + OpenAI-compatible API (9arm / LM Studio)
# Usage: docker compose -f docker-compose.lmstudio.yaml up -d

services:
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile.deploy
    image: open-webui-ldap:local
    container_name: open-webui
    env_file:
      - .env
    volumes:
      - open-webui:/app/backend/data
      # Keep custom static assets even if image is stale or not rebuilt
      - ./deploy/auth-ldap-fix.js:/app/build/static/auth-ldap-fix.js:ro
      - ./deploy/hide-model-for-users.js:/app/build/static/hide-model-for-users.js:ro
      - ./deploy/custom.css:/app/build/static/custom.css:ro
    ports:
      - ${OPEN_WEBUI_PORT-3303}:8080
    environment:
      - ENABLE_OLLAMA_API=false
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URLS=${OPENAI_API_BASE_URLS:-https://gateway.9arm.co/v1}
      - OPENAI_API_KEYS=${OPENAI_API_KEYS}
      - DEFAULT_MODELS=${DEFAULT_MODELS:-qwen3.6-35b-a3b}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-}
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-false}
      - ENABLE_LOGIN_FORM=${ENABLE_LOGIN_FORM:-false}
      - ENABLE_PERSISTENT_CONFIG=${ENABLE_PERSISTENT_CONFIG:-false}
      - DEFAULT_USER_ROLE=${DEFAULT_USER_ROLE:-user}
      - BYPASS_MODEL_ACCESS_CONTROL=${BYPASS_MODEL_ACCESS_CONTROL:-true}
      - ENABLE_LDAP=${ENABLE_LDAP:-false}
      - LDAP_SERVER_LABEL=${LDAP_SERVER_LABEL:-}
      - LDAP_SERVER_HOST=${LDAP_SERVER_HOST:-}
      - LDAP_SERVER_PORT=${LDAP_SERVER_PORT:-389}
      - LDAP_USE_TLS=${LDAP_USE_TLS:-false}
      - LDAP_VALIDATE_CERT=${LDAP_VALIDATE_CERT:-false}
      - LDAP_SEARCH_BASE=${LDAP_SEARCH_BASE:-}
      - LDAP_SEARCH_FILTERS=${LDAP_SEARCH_FILTERS:-}
      - LDAP_ATTRIBUTE_FOR_USERNAME=${LDAP_ATTRIBUTE_FOR_USERNAME:-sAMAccountName}
      - LDAP_ATTRIBUTE_FOR_MAIL=${LDAP_ATTRIBUTE_FOR_MAIL:-mail}
      - LDAP_APP_DN=${LDAP_APP_DN:-}
      - LDAP_APP_PASSWORD=${LDAP_APP_PASSWORD:-}
      - ENABLE_LDAP_GROUP_MANAGEMENT=${ENABLE_LDAP_GROUP_MANAGEMENT:-false}
      - LDAP_ATTRIBUTE_FOR_GROUPS=${LDAP_ATTRIBUTE_FOR_GROUPS:-memberOf}
    restart: unless-stopped

volumes:
  open-webui: {}
